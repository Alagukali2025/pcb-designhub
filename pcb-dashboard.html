    <script>
        const db = {
            dashboard: {
                title: "Learning Dashboard",
                intro: "Select a topic below to begin your engineering journey.",
                modules: [
                    { id: "footprint", icon: "fa-microchip", title: "Footprint Creation", desc: "Master IPC-7351 standards and land patterns." },
                    { id: "stackup", icon: "fa-layer-group", title: "Stackup Design", desc: "Understand materials, prepreg, and cores." },
                    { id: "diff_pair", icon: "fa-code-merge", title: "Differential Pair Routing", desc: "Learn phase matching and coupling." },
                    { id: "high_speed", icon: "fa-bolt", title: "High-Speed Routing", desc: "Impedance control and length matching." },

                    { id: "si_pi", icon: "fa-wave-square", title: "SI/PI Calculation", desc: "Signal and power integrity basics." }
                ]
            },
            footprint: {
                title: "Footprint Creation (IPC-7351)",
                intro: "A footprint (or land pattern) is the physical arrangement of copper pads on a PCB. Designing it incorrectly leads to tombstoning, solder bridges, and manufacturing failures.",
                sections: [
                    {
                        heading: "The IPC-7351 Standard",
                        content: "IPC-7351 is the global standard for surface mount design. It relies on mathematical models to calculate the exact pad size based on the component's leads and required solder fillets (Toe, Heel, and Side)."
                    },
                    {
                        heading: "The 3 Density Levels",
                        content: "Not all boards are the same. IPC defines three density levels to determine how much extra pad area you need:",
                        cards: [
                            { title: "Level A (Maximum)", text: "For low-density boards or extreme environments. Largest solder joints for maximum physical strength." },
                            { title: "Level B (Nominal)", text: "The standard for most desktop and consumer electronics. A perfect balance between size and reliability." },
                            { title: "Level C (Least)", text: "For high-density mobile devices. Minimal solder joints to save maximum board space." }
                        ]
                    },
                    {
                        heading: "Design Guidelines & Courtyard",
                        content: "The <strong>Courtyard</strong> is the absolute minimum area required around a component. It includes the component body, the pads, and an extra 'excess' boundary to prevent pick-and-place machines from crashing components into each other."
                    },
                    {
                        heading: "Common Mistakes to Avoid",
                        list: [
                            "Placing silkscreen over exposed copper pads (prevents solder from sticking).",
                            "Forgetting to mark Pin 1 on both the Assembly and Silkscreen layers.",
                            "Ignoring manufacturing tolerances and making the courtyard too tight."
                        ]
                    }
                ],
                checklist: [
                    "Verify datasheet dimensions and tolerances.",
                    "Calculate Toe, Heel, and Side fillets for Density Level B.",
                    "Ensure Silkscreen clearance is at least 0.1mm from pads.",
                    "Add Courtyard polygon on the correct mechanical layer.",
                    "Verify 3D STEP model aligns perfectly with pads."
                ]
            },
            // Added Stackup Data utilizing the new 'blocks' array structure for precise mapping
            stackup: {
                title: "PCB Stackup Design",
                intro: "Engineering Reference - Stackup Architecture, Signal Integrity & Impedance Control. Standards: IPC-2141A, IPC-2221B, IPC-4101C, IPC-A-600. [cite: 1, 2, 3]",
                blocks: [
                    { type: "h2", text: "1. PCB Stackup Fundamentals [cite: 4]" },
                    { type: "p", text: "A PCB stackup is the ordered arrangement of copper layers, prepreg (B-stage resin), and core (C-stage) materials that form the final laminated board. Every electrical, mechanical, and thermal property of the PCB is a direct consequence of this arrangement. The stackup is not a post-design consideration—it is the foundation upon which signal integrity, power delivery, EMC compliance, and manufacturability are built. [cite: 5, 6, 7]" },
                    { type: "p", text: "IPC-2221B (Generic Standard on Printed Board Design) and IPC-4101C (Specification for Base Materials) govern material selection and construction. IPC-2141A governs controlled-impedance requirements. [cite: 8, 9]" },
                    { type: "h3", text: "1.1 Key Materials Terminology [cite: 10, 11]" },
                    { type: "table", headers: ["Term", "Definition", "Typical Value"], rows: [
                        ["Core", "Fully cured (C-stage) dielectric with copper foil laminated on both sides. Provides dimensional stability.", "200-1200 μm [cite: 12]"],
                        ["Prepreg", "Partially cured (B-stage) glass/resin sheet. Flows and bonds during lamination. Controls dielectric height (h).", "75-200 μm [cite: 12]"],
                        ["εr (Dk)", "Relative dielectric constant of insulating material. Frequency-dependent.", "FR4: 4.0-4.8 [cite: 12]"],
                        ["Df (tan δ)", "Dissipation factor-loss tangent. Governs high-frequency signal loss.", "FR4: ~0.02 @ 1 GHz [cite: 12]"],
                        ["Design Dk", "Effective dielectric constant used for impedance calculations.", "4.2 (nominal FR4) [cite: 12]"],
                        ["1 oz Cu", "Standard copper weight: 1 oz/ft² = 35 µm finished thickness.", "35 µm (1.35 mil) [cite: 12]"]
                    ]},
                    { type: "h2", text: "2. Stackup Structures by Layer Count [cite: 13]" },
                    { type: "h3", text: "2.1 2-Layer PCB [cite: 14, 15]" },
                    { type: "p", text: "The simplest buildable structure. Both signal and power routing share the two available copper layers with no embedded reference planes. Suitable only for low-frequency, low-density, non-RF designs. [cite: 16, 17]" },
                    { type: "table", headers: ["Layer", "Function", "Thickness"], rows: [
                        ["Solder Mask", "Surface protection/soldermask (both sides)", "- [cite: 18]"],
                        ["L1-Signal", "Signal traces + power routing (top surface)", "1 oz (35 µm) [cite: 18]"],
                        ["Core (FR4)", "Substrate dielectric", "1.0 to 1.6 mm typical [cite: 18]"],
                        ["L2-Signal", "Signal traces + GND copper pours (bottom)", "1 oz (35 µm) [cite: 18]"]
                    ]},
                    { type: "ul", items: [
                        "<strong>IPC Class:</strong> Class 1 (general), Class 2 (dedicated service) [cite: 18]",
                        "<strong>Impedance control:</strong> Poor - no solid reference plane [cite: 18]",
                        "<strong>EMI performance:</strong> Poor - large current loops [cite: 18]",
                        "<strong>Typical applications:</strong> Power supply PCBs, LED drivers, relay modules, simple control boards [cite: 18]",
                        "<strong>Max practical frequency:</strong> ~50-100 MHz (design-dependent) [cite: 19]"
                    ]},
                    { type: "h3", text: "2.2 4-Layer PCB [cite: 20]" },
                    { type: "p", text: "The minimum stack for any serious industrial or communications design. The addition of two inner planes—typically GND (L2) and PWR (L3)—provides controlled return current paths and radically improves signal integrity and EMI performance. [cite: 21, 22, 23]" },
                    { type: "table", headers: ["Layer", "Function", "Thickness"], rows: [
                        ["L1-Signal (top)", "Microstrip-high-speed signals, component side", "1 oz (35 µm) [cite: 24]"],
                        ["Prepreg", "Controls dielectric height h for L1 impedance", "~4 mil (102 µm) [cite: 24]"],
                        ["L2-GND Plane", "Solid ground reference - uninterrupted", "1/2 oz (17 µm) [cite: 24]"],
                        ["Core", "Board bulk-sets total thickness, not used for impedance", "~47 mil (1.19 mm) [cite: 24]"],
                        ["L3-PWR Plane", "Power distribution VCC pours per rail", "1/2 oz (17 µm) [cite: 24]"],
                        ["Prepreg", "Controls dielectric height h for L4 impedance", "~4 mil (102 µm) [cite: 24]"],
                        ["L4-Signal (btm)", "Microstrip-signals, solder side", "1 oz (35 µm) [cite: 24]"]
                    ]},
                    { type: "p", text: "<strong>Critical rule:</strong> Never route high-speed signals on a layer that does not have a solid reference plane as its nearest neighbour. A split or voided plane beneath a high-speed trace forces return current to find an alternative path, creating a radiating loop antenna. [cite: 26, 27]" },
                    { type: "p", text: "The L2-L3 adjacency (GND-PWR) with ~1.2 mm separation forms a distributed bypass capacitor. Capacitance = ε<sub>0</sub> &middot; ε<sub>r</sub> &middot; A/h. For a 100 cm² board at 4 mil prepreg (ε<sub>r</sub> = 4.2), C &approx; 93 nF - effective above 100 MHz without discrete components. [cite: 28, 29]" },
                    { type: "h3", text: "2.3 6-Layer PCB [cite: 30]" },
                    { type: "p", text: "Used when routing density, mixed voltage domains, or controlled-impedance differential pairs demand more signal layers. The standard 6-layer arrangement provides two additional signal layers (L3, L4) as balanced striplines, maintaining solid reference planes throughout. [cite: 31, 32]" },
                    { type: "table", headers: ["Layer", "Function", "Thickness"], rows: [
                        ["L1-Signal", "Top microstrip-high-speed, RF, diff pairs", "1 oz (35 µm) [cite: 33]"],
                        ["Prepreg", "~4 mil-sets Z0 for L1", "~4 mil [cite: 33]"],
                        ["L2-GND Plane", "Solid ground reference for L1 microstrip, L3 stripline", "1/2 oz [cite: 33]"],
                        ["Core", "Dielectric core", "~10 mil [cite: 33]"],
                        ["L3-Signal", "Stripline shielded, preferred for sensitive signals", "1/2 oz [cite: 33]"],
                        ["Core (centre)", "Board centre layer (symmetry point)", "~21 mil [cite: 33]"],
                        ["L4-Signal", "Stripline route orthogonally to L3", "1/2 oz [cite: 33]"],
                        ["Core", "Dielectric core", "~10 mil [cite: 33]"],
                        ["L5-PWR Plane", "Power distribution reference for L4/L6", "1/2 oz [cite: 33]"],
                        ["Prepreg", "~4 mil-sets Z0 for L6", "~4 mil [cite: 33]"],
                        ["L6-Signal", "Bottom microstrip - signals, solder side", "1 oz (35 µm) [cite: 34]"]
                    ]},
                    { type: "ul", items: [
                        "Route L3 and L4 orthogonally (e.g. L3 horizontal, L4 vertical) to minimise broadside coupling. [cite: 35]",
                        "Stripline layers provide inherent EMI shielding - preferred for sensitive analog and low-noise digital signals. [cite: 36]",
                        "Field is fully contained within dielectric on stripline layers - effective εr = bulk εr (not effective). [cite: 37]"
                    ]},
                    { type: "h3", text: "2.4 8-Layer and Higher [cite: 38, 39]" },
                    { type: "p", text: "For HDI, server-class, telecommunications, and aerospace designs. Stackup philosophy scales by adding signal-plane pairs symmetrically about the board centre to maintain flatness and avoid warpage during lamination (IPC-2221B §9.1.3). [cite: 40]" },
                    { type: "table", headers: ["Layer", "Function", "Type", "Notes"], rows: [
                        ["L1", "Signal (high-speed, DDR, RF)", "Microstrip", "component side - 1 oz [cite: 41]"],
                        ["L2", "GND plane", "Reference", "1/2 oz - solid [cite: 41]"],
                        ["L3", "Signal", "Stripline", "1/2 oz - shielded [cite: 41]"],
                        ["L4", "GND plane", "Reference", "1/2 oz - solid [cite: 41]"],
                        ["L5", "PWR plane", "Reference", "1/2 oz - distributed bypass with L4 [cite: 41]"],
                        ["L6", "Signal", "Stripline", "1/2 oz - shielded [cite: 41]"],
                        ["L7", "GND plane", "Reference", "1/2 oz - solid [cite: 41]"],
                        ["L8", "Signal (bottom)", "Microstrip", "solder side - 1 oz [cite: 41]"]
                    ]},
                    { type: "p", text: "<strong>IPC symmetry rule:</strong> Stackup must be mirror-symmetric about the centre plane. L1 must match L8 (material, thickness, copper weight), L2 must match L7, etc. Asymmetric stackups bow during reflow due to CTE mismatch—a manufacturing defect risk and key inspection criterion per IPC-A-600. [cite: 43, 44]" },
                    { type: "h2", text: "3. Signal Integrity, EMI/EMC, and Thermal Performance [cite: 45]" },
                    { type: "h3", text: "3.1 Signal Integrity [cite: 46, 47]" },
                    { type: "p", text: "The stackup controls the characteristic impedance of every trace. A trace routed without a reference plane has an undefined impedance—signals reflect at every discontinuity, creating inter-symbol interference (ISI) and timing jitter. [cite: 48]" },
                    { type: "p", text: "<strong>Return current principle:</strong> At high frequencies (>1 MHz), return current concentrates in the reference plane directly beneath the signal trace. Any gap, slot, or plane split in the reference forces return current to detour, creating a radiating loop (EMI) and adding inductance (SI degradation). Never route a via that crosses a plane split in the reference layer. [cite: 49, 50, 51]" },
                    { type: "p", text: "Crosstalk is controlled by trace-to-trace spacing and dielectric height. IPC-2141A recommends the 3W rule: edge-to-edge spacing ≥ 3x trace width to achieve <1% crosstalk coupling. At inner stripline layers, 3W can sometimes be relaxed to 2W due to the dual reference plane effect. [cite: 52, 53]" },
                    { type: "h3", text: "3.2 EMI/EMC [cite: 54]" },
                    { type: "ul", items: [
                        "<strong>Tight coupling to reference plane:</strong> Lower prepreg height (h) reduces loop area and radiated emissions. A trace 4 mil from its reference radiates less than one 12 mil away. [cite: 55, 56]",
                        "<strong>GND-PWR plane capacitance:</strong> Adjacent inner planes form distributed capacitor C = ε<sub>0</sub> &middot; ε<sub>r</sub> &middot; A/t, effective above ~100 MHz. [cite: 57]",
                        "<strong>Symmetric stackup:</strong> Prevents common-mode current from circulating due to asymmetric inductance. [cite: 58]",
                        "<strong>Via return path:</strong> Every signal via transitioning between layers should have a GND return via within 250 mil (IPC-2141A) to provide a low-inductance return path. [cite: 59]"
                    ]},
                    { type: "h3", text: "3.3 Thermal Performance [cite: 60]" },
                    { type: "p", text: "Copper planes act as thermal spreaders. A solid ground plane on L2 with thermal vias (filled, capped per IPC-4761) conducts heat from L1 components into the board mass. Inner plane thermal resistance depends on copper weight and continuity—a split power plane has significantly higher thermal resistance. Arrays of thermal vias under exposed pads (per IPC-7093) are standard for QFN, PowerPAD, and DFN packages. [cite: 61, 62, 63]" },
                    { type: "p", text: "Via thermal resistance: R<sub>th</sub> = L / (k &middot; π &middot; (r<sub>o</sub><sup>2</sup> - r<sub>i</sub><sup>2</sup>))<br>Where L = board thickness, k = copper conductivity (385 W/m-K), r<sub>o</sub> and r<sub>i</sub> are outer and inner via radii. [cite: 64, 65]" },
                    { type: "h2", text: "4. Impedance Control [cite: 66]" },
                    { type: "h3", text: "4.1 Why Impedance Matters [cite: 67, 68]" },
                    { type: "p", text: "Any transmission line with a characteristic impedance (Z<sub>0</sub>) that does not match the source or load produces reflections. The reflection coefficient:<br>Γ = (Z<sub>L</sub> - Z<sub>0</sub>) / (Z<sub>L</sub> + Z<sub>0</sub>)<br>For a 50Ω trace driving a 75Ω load, Γ = +0.20 — 20% of the signal voltage reflects back. At high data rates this corrupts the eye diagram and causes bit errors. IPC-2141A governs controlled-impedance PCB design and defines the manufacturing tolerance framework. [cite: 69, 70, 71, 72, 73, 74]" },
                    { type: "h3", text: "4.2 Microstrip Impedance Formula (IPC-2141A) [cite: 75]" },
                    { type: "p", text: "For a single-ended trace on an outer layer with one reference plane below:<br>Z<sub>0</sub> = (87 / &radic;(ε<sub>r</sub> + 1.41)) &times; ln(5.98h / (0.8W + t)) [cite: 76, 77]" },
                    { type: "table", headers: ["Symbol", "Definition", "Typical Value / Unit"], rows: [
                        ["Z0", "Characteristic impedance", "Target: 50Ω [cite: 78]"],
                        ["εr", "Relative dielectric constant of PCB material", "FR4: 4.0-4.8 (use 4.2 for design) [cite: 78]"],
                        ["h", "Dielectric height prepreg thickness from trace bottom to reference plane", "4-6 mil (100-150 μm) [cite: 78]"],
                        ["W", "Trace width", "Calculated for target Z0 [cite: 78]"],
                        ["t", "Copper thickness (finished)", "1 oz = 1.35 mil (34.3 µm); 1/2 oz = 0.675 mil [cite: 78]"]
                    ]},
                    { type: "p", text: "<em>Note: Effective εr for microstrip is less than bulk material εr because the EM field is partly in the air above the trace. Valid for W/h ratios of 0.1 to 2.0.</em> [cite: 79, 80]" },
                    { type: "h3", text: "4.3 Centred Stripline Impedance Formula (IPC-2141A) [cite: 81, 82]" },
                    { type: "p", text: "For a single-ended trace on an inner layer, centred between two reference planes:<br>Z<sub>0</sub> = (60 / &radic;ε<sub>r</sub>) &times; ln(4b / (0.67π &times; (0.8W + t))) [cite: 83, 84]" },
                    { type: "table", headers: ["Symbol", "Definition", "Typical Value"], rows: [
                        ["εr", "Bulk dielectric constant - field entirely in laminate (no air)", "FR4: 4.0-4.8 [cite: 85]"],
                        ["b", "Total distance between reference planes", "20-40 mil [cite: 85]"],
                        ["W", "Trace width", "Calculated [cite: 85]"],
                        ["t", "Copper thickness", "1/2 oz = 0.675 mil [cite: 85]"]
                    ]},
                    { type: "h3", text: "4.4 Differential Pair Impedance [cite: 86, 87]" },
                    { type: "p", text: "Differential pairs (USB, Ethernet, PCIe, LVDS, HDMI) require differential impedance Z<sub>diff</sub> control:<br>Z<sub>diff</sub> = 2 &times; Z<sub>0</sub> &times; (1 - 0.347 &times; e<sup>-2.9 &times; S/h</sup>)<br>Where S is the edge-to-edge spacing between the two traces. The coupling factor reduces Z<sub>diff</sub> below 2&middot;Z<sub>0</sub> as traces are brought closer together. [cite: 88, 89, 90, 91]" },
                    { type: "table", headers: ["Target Z_diff", "Use Case", "Approx. Trace/Space (FR4, h=4 mil, 1 oz)"], rows: [
                        ["90Ω differential", "USB 2.0, USB 3.x, LVDS", "~5 mil trace / 5 mil space [cite: 92]"],
                        ["100Ω differential", "Ethernet, PCIe, HDMI", "~6 mil trace / 6 mil space [cite: 92]"],
                        ["120Ω differential", "RS485, RS422 (long-line termination)", "Wider spacing or higher h [cite: 92]"]
                    ]},
                    { type: "p", text: "<em>Always verify with PCB manufacturer field solver and confirmed material Dk.</em> [cite: 93]" },
                    { type: "h3", text: "4.5 Worked Example: 50Ω Microstrip on 4-Layer FR4 [cite: 94]" },
                    { type: "ul", items: [
                        "Material: FR4, εr = 4.2 (manufacturer-confirmed Dk) [cite: 95]",
                        "Prepreg thickness h = 4.0 mil (102 µm) - L1 to L2 [cite: 96]",
                        "Copper weight L1: 1 oz → t = 1.35 mil [cite: 97]",
                        "Target: Z0 = 50Ω [cite: 98]"
                    ]},
                    { type: "table", headers: ["W (mil)", "Calculation", "Z0", "Result", "Decision"], rows: [
                        ["7.0", "36.72 &times; ln(23.92 / 6.95)", "45.4Ω", "Too low", "✗ [cite: 100]"],
                        ["5.5", "36.72 &times; ln(23.92 / 5.75)", "52.4Ω", "Slightly high", "✗ [cite: 100]"],
                        ["6.0", "36.72 &times; ln(23.92 / 6.15)", "49.8Ω", "✓ Target met", "✓ [cite: 100]"]
                    ]},
                    { type: "p", text: "Result: 6.0 mil (0.152 mm) trace width achieves ~50Ω on a 4-layer FR4 board with 4 mil prepreg. Manufacturer impedance tolerance per IPC-2141A: ±10% standard; specify ±5% with TDR coupon testing. [cite: 101, 102]" },
                    { type: "h3", text: "4.6 PCB Material Selection Beyond FR4 [cite: 103, 104]" },
                    { type: "table", headers: ["Material", "Er", "Df (tan δ)", "Application"], rows: [
                        ["Standard FR4 (Isola 370HR, Shengyi S1000-2)", "4.0-4.8", "0.020-0.025", "General industrial, up to 1 GHz [cite: 105]"],
                        ["High-speed FR4 (Isola FR408HR, TU-872)", "3.6-3.9", "0.010-0.015", "PCIe Gen3/4, 10GbE [cite: 105]"],
                        ["PTFE/Rogers RO4003C", "3.55", "0.0027", "RF, microwave, mmWave [cite: 105]"],
                        ["Low-loss ceramic (Megtron 6)", "3.6-3.7", "0.002", "25G+ SerDes, automotive radar [cite: 105]"]
                    ]},
                    { type: "h3", text: "4.7 Manufacturing Constraints and DFM Rules [cite: 106]" },
                    { type: "ul", items: [
                        "Minimum trace width: 3 mil (75 µm) standard; 2 mil (50 µm) for HDI processes. [cite: 107]",
                        "Impedance coupon: Place 6-inch controlled-impedance test trace on each panel edge. TDR measurement at incoming QC verifies fabricated stackup matches design intent. [cite: 108, 109]",
                        "Prepreg thickness tolerance: ±10-15%. Specify materials by IPC-4101 slash sheet (e.g., /21 for 7628 glass style, /26 for 1080 glass style)—never by generic 'FR4'. [cite: 110]",
                        "Copper etch correction: Trace width increases at base due to etch undercut (trapezoidal cross-section). Manufacturers apply 0.5-1 mil width correction—account for this in impedance calculation. [cite: 111, 112]",
                        "Solder mask over impedance traces: Mask Dk = 3.5-4.0 adds effective εr above microstrip trace. For RF, specify 'no solder mask over controlled-impedance traces'. [cite: 113, 114]",
                        "Stackup specification in fab notes: List each layer material, glass style, Dk, Df, copper weight, and finished thickness. Reference IPC-4101C. Do not rely on fabricator to infer from board thickness. [cite: 115, 116]"
                    ]},
                    { type: "h2", text: "5. Design Checklist - IPC-Compliant Industrial Practice [cite: 117]" },
                    { type: "table", headers: ["No.", "Checklist Item", "Reference"], rows: [
                        ["1", "Every high-speed signal layer has an uninterrupted reference plane as nearest neighbour", "IPC-2221B §9 [cite: 118]"],
                        ["2", "Prepreg glass style and Dk/Df sourced from manufacturer datasheet, not generic FR4 values", "IPC-4101C [cite: 119]"],
                        ["3", "Target impedance calculated using field solver; verified with TDR coupons", "IPC-2141A §4.2 [cite: 119]"],
                        ["4", "Stackup is mirror-symmetric about board centre plane to prevent reflow warpage", "IPC-2221B §9.1.3 [cite: 119]"],
                        ["5", "GND return via placed within 250 mil of every signal via transitioning between layers", "IPC-2141A [cite: 119]"],
                        ["6", "Differential pairs: matched length (±5 mil USB/LVDS; ±1 mil PCIe Gen4+)", "Protocol spec [cite: 119]"],
                        ["7", "No signal routing across reference plane splits or voids", "SI/EMI best practice [cite: 119]"],
                        ["8", "Thermal vias specified under exposed pads (QFN, PowerPAD, DFN) per IPC-7093", "IPC-7093 [cite: 119]"],
                        ["9", "Stackup drawing submitted to PCB fabricator as controlled document", "IPC-2221B [cite: 119]"],
                        ["10", "Incoming QC includes TDR coupon test for all controlled-impedance layers", "IPC-2141A §4 [cite: 119]"]
                    ]},
                    { type: "p", text: "<em>This document is prepared in accordance with IPC-2141A (Controlled Impedance Circuit Boards), IPC-2221B (Generic Standard on Printed Board Design), IPC-4101C (Specification for Base Materials), and IPC-A-600 (Acceptability of Printed Boards). All impedance formulas are sourced from IPC-2141A Appendix A. Field solver verification is mandatory for tolerances tighter than ±10%.</em> [cite: 120, 121]" }
                ]
            }
        };

        function loadPage(pageId) {
            const contentDiv = document.getElementById('app-content');
            const data = db[pageId] || { title: "Module Coming Soon", intro: "This engineering module is currently under development." };
            
            // Task 3: Back Navigation Logic
            const backBtn = document.getElementById('back-btn');
            if (pageId === 'dashboard') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }

            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth; 
            contentDiv.classList.add('fade-in');

            let html = `
                <div class="mb-8 border-b border-zinc-200 pb-6">
                    <h1 class="text-3xl md:text-4xl font-bold text-zinc-900 tracking-tight">${data.title}</h1>
                    <p class="text-zinc-600 mt-3 text-lg leading-relaxed whitespace-pre-line">${data.intro}</p>
                </div>
            `;

            // Existing Dashboard rendering
            if (pageId === 'dashboard' && data.modules) {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8">`;
                data.modules.forEach(mod => {
                    html += `
                        <div onclick="loadPage('${mod.id}')" class="bg-white border border-zinc-200 p-6 rounded-xl shadow-sm hover:shadow-lg hover:border-blue-400 transform hover:-translate-y-1 transition-all cursor-pointer group">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i class="fa-solid ${mod.icon}"></i>
                            </div>
                            <h3 class="font-bold text-zinc-900 mb-2 group-hover:text-blue-600 transition-colors">${mod.title}</h3>
                            <p class="text-sm text-zinc-500">${mod.desc}</p>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // Enhanced renderer for the new Stackup 'blocks' structure
            if (data.blocks) {
                html += `<div class="space-y-6">`;
                data.blocks.forEach(block => {
                    if (block.type === 'h2') {
                        html += `<h2 class="text-2xl font-bold text-zinc-900 mt-10 mb-4 border-b border-zinc-200 pb-2">${block.text}</h2>`;
                    } else if (block.type === 'h3') {
                        html += `<h3 class="text-xl font-semibold text-zinc-800 mt-8 mb-3">${block.text}</h3>`;
                    } else if (block.type === 'p') {
                        html += `<p class="text-zinc-700 leading-relaxed">${block.text}</p>`;
                    } else if (block.type === 'ul') {
                        html += `<ul class="list-disc list-outside ml-6 space-y-2 text-zinc-700">`;
                        block.items.forEach(item => html += `<li>${item}</li>`);
                        html += `</ul>`;
                    } else if (block.type === 'table') {
                        html += `<div class="overflow-x-auto my-6 border border-zinc-200 rounded-lg shadow-sm">
                                    <table class="w-full text-sm text-left text-zinc-700">`;
                        if (block.headers) {
                            html += `<thead class="text-xs text-zinc-800 bg-zinc-100 border-b border-zinc-200"><tr>`;
                            block.headers.forEach(h => html += `<th class="px-4 py-3 border-r border-zinc-200 last:border-0">${h}</th>`);
                            html += `</tr></thead>`;
                        }
                        html += `<tbody class="divide-y divide-zinc-200">`;
                        block.rows.forEach(row => {
                            html += `<tr class="hover:bg-zinc-50 transition-colors">`;
                            row.forEach(cell => html += `<td class="px-4 py-3 border-r border-zinc-200 last:border-0">${cell}</td>`);
                            html += `</tr>`;
                        });
                        html += `</tbody></table></div>`;
                    }
                });
                html += `</div>`;
            }

            // Existing Footprint rendering logic
            if (data.sections) {
                html += `<div class="space-y-10">`;
                data.sections.forEach(sec => {
                    html += `<section><h2 class="text-xl font-bold text-zinc-900 mb-3 flex items-center"><i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> ${sec.heading}</h2>`;
                    if (sec.content) html += `<p class="text-zinc-700 leading-relaxed mb-4">${sec.content}</p>`;
                    if (sec.cards) {
                        html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">`;
                        sec.cards.forEach(card => {
                            html += `<div class="bg-white border border-zinc-200 p-5 rounded-lg shadow-sm border-t-4 border-t-blue-500"><h4 class="font-bold text-zinc-900 mb-2">${card.title}</h4><p class="text-sm text-zinc-600">${card.text}</p></div>`;
                        });
                        html += `</div>`;
                    }
                    if (sec.list) {
                        html += `<ul class="space-y-3 mt-4">`;
                        sec.list.forEach(item => {
                            html += `<li class="flex items-start bg-red-50 text-red-900 p-3 rounded-md border border-red-100"><i class="fa-solid fa-triangle-exclamation text-red-500 mr-3 mt-0.5"></i> ${item}</li>`;
                        });
                        html += `</ul>`;
                    }
                    html += `</section>`;
                });
                html += `</div>`;
            }

            if (data.checklist) {
                html += `
                    <div class="mt-12 bg-white border border-zinc-200 rounded-xl shadow-sm p-6 md:p-8">
                        <h3 class="text-xl font-bold text-zinc-900 mb-4 flex items-center"><i class="fa-solid fa-list-check text-emerald-600 mr-3"></i> Final DFM Checklist</h3>
                        <ul class="space-y-3">
                `;
                data.checklist.forEach(item => {
                    html += `<li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)"><i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i> ${item}</li>`;
                });
                html += `</ul></div>`;
            }

            contentDiv.innerHTML = html;

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(nav => {
                nav.classList.remove('bg-blue-50', 'text-blue-600');
                nav.classList.add('hover:bg-zinc-100');
                if (nav.getAttribute('data-page') === pageId) {
                    nav.classList.remove('hover:bg-zinc-100');
                    nav.classList.add('bg-blue-50', 'text-blue-600');
                }
            });
        }

        function toggleCheck(element) {
            const icon = element.querySelector('i');
            if (icon.classList.contains('fa-square')) {
                icon.className = 'fa-solid fa-square-check text-emerald-500 mr-3 text-lg';
                element.classList.add('text-zinc-400', 'line-through');
            } else {
                icon.className = 'fa-regular fa-square text-zinc-400 mr-3 text-lg';
                element.classList.remove('text-zinc-400', 'line-through');
            }
        }

        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                loadPage(item.getAttribute('data-page'));
            });
        });

        document.getElementById('logo-btn').addEventListener('click', () => loadPage('dashboard'));
        // Bind the Back Button
        document.getElementById('back-btn').addEventListener('click', () => loadPage('dashboard'));
        
        window.onload = () => loadPage('dashboard');
    </script>
</body>
</html>
