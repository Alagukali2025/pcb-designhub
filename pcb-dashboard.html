<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Masterclass Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stackup Design: table styling */
        .stackup-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .stackup-table th { background: #1e40af; color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
        .stackup-table td { padding: 8px 12px; border-bottom: 1px solid #e4e4e7; vertical-align: top; }
        .stackup-table tr:nth-child(even) td { background: #f8fafc; }
        .stackup-table tr:hover td { background: #eff6ff; }

        /* Layer row colour coding for stackup diagrams */
        .layer-signal    { background: #fef9c3; }
        .layer-gnd       { background: #dcfce7; }
        .layer-pwr       { background: #fce7f3; }
        .layer-prepreg   { background: #f0f9ff; }
        .layer-core      { background: #f5f5f4; }
        .layer-mask      { background: #f3e8ff; }

        /* Formula block */
        .formula-block { background: #0f172a; color: #7dd3fc; font-family: 'Courier New', monospace; padding: 14px 18px; border-radius: 8px; font-size: 0.92rem; line-height: 1.7; overflow-x: auto; }

        /* Back button */
        .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 0.875rem; font-weight: 500; color: #3b82f6; cursor: pointer; padding: 6px 12px; border-radius: 6px; border: 1px solid #bfdbfe; background: #eff6ff; transition: all 0.15s; user-select: none; }
        .back-btn:hover { background: #dbeafe; border-color: #93c5fd; }
    </style>
</head>
<body class="bg-slate-50 text-zinc-900 h-screen flex overflow-hidden">

    <!-- ===== SIDEBAR ===== -->
    <aside class="hidden md:flex flex-col w-64 border-r border-zinc-200 bg-white z-20">
        <!-- Logo / Home button -->
        <div id="logo-btn" class="h-16 flex items-center px-6 border-b border-zinc-200 font-bold text-lg text-zinc-800 cursor-pointer hover:bg-zinc-50 transition-colors">
            <i class="fa-solid fa-layer-group text-blue-600 mr-2"></i> PCB Masterclass
        </div>

        <nav class="flex-1 py-6">
            <ul class="space-y-2 px-3 text-sm font-medium text-zinc-600" id="sidebar-menu">
                <!-- Footprint Creation (existing) -->
                <li data-page="footprint" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-microchip w-6 text-center"></i> Footprint Creation
                </li>
                <!-- NEW: Stackup Design -->
                <li data-page="stackup" class="nav-item px-3 py-2.5 rounded-md cursor-pointer hover:bg-zinc-100 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-layer-group w-6 text-center"></i> Stackup Design
                </li>
            </ul>
        </nav>
    </aside>

    <!-- ===== MAIN AREA ===== -->
    <main class="flex-1 flex flex-col overflow-hidden relative">

        <!-- Top Header -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-zinc-200 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center bg-zinc-100 rounded-md px-3 py-2 w-64 md:w-96 border border-zinc-200 focus-within:border-blue-500 transition-colors">
                <i class="fa-solid fa-search text-zinc-400"></i>
                <input type="text" placeholder="Search rules, standards..." class="bg-transparent border-none outline-none ml-2 text-sm w-full">
            </div>
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-sm">JD</div>
        </header>

        <!-- Scrollable content area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
            <div id="app-content" class="max-w-4xl mx-auto fade-in"></div>
        </div>
    </main>

    <script>
    // ─────────────────────────────────────────────
    //  DATA STORE
    // ─────────────────────────────────────────────
    const db = {
        // ── DASHBOARD ──────────────────────────────
        dashboard: {
            title: "Learning Dashboard",
            intro: "Select a topic below to begin your engineering journey.",
            modules: [
                { id: "footprint",  icon: "fa-microchip",      title: "Footprint Creation",        desc: "Master IPC-7351 standards and land patterns." },
                { id: "stackup",    icon: "fa-layer-group",     title: "Stackup Design",            desc: "Understand materials, prepreg, and cores." },
                { id: "diff_pair",  icon: "fa-code-merge",      title: "Differential Pair Routing", desc: "Learn phase matching and coupling." },
                { id: "high_speed", icon: "fa-bolt",            title: "High-Speed Routing",        desc: "Impedance control and length matching." },
                { id: "ddr",        icon: "fa-memory",          title: "DDR Routing",               desc: "Fly-by topology and byte lane routing." },
                { id: "emi_emc",    icon: "fa-shield-halved",   title: "EMI / EMC",                 desc: "Mitigate radiation and ensure compliance." },
                { id: "dfm_dft",    icon: "fa-industry",        title: "DFM / DFT",                 desc: "Design for manufacturing and testing." },
                { id: "si_pi",      icon: "fa-wave-square",     title: "SI/PI Calculation",         desc: "Signal and power integrity basics." }
            ]
        },

        // ── FOOTPRINT CREATION (unchanged) ─────────
        footprint: {
            title: "Footprint Creation (IPC-7351)",
            intro: "A footprint (or land pattern) is the physical arrangement of copper pads on a PCB. Designing it incorrectly leads to tombstoning, solder bridges, and manufacturing failures.",
            sections: [
                {
                    heading: "The IPC-7351 Standard",
                    content: "IPC-7351 is the global standard for surface mount design. It relies on mathematical models to calculate the exact pad size based on the component's leads and required solder fillets (Toe, Heel, and Side)."
                },
                {
                    heading: "The 3 Density Levels",
                    content: "Not all boards are the same. IPC defines three density levels to determine how much extra pad area you need:",
                    cards: [
                        { title: "Level A (Maximum)", text: "For low-density boards or extreme environments. Largest solder joints for maximum physical strength." },
                        { title: "Level B (Nominal)",  text: "The standard for most desktop and consumer electronics. A perfect balance between size and reliability." },
                        { title: "Level C (Least)",    text: "For high-density mobile devices. Minimal solder joints to save maximum board space." }
                    ]
                },
                {
                    heading: "Design Guidelines & Courtyard",
                    content: "The <strong>Courtyard</strong> is the absolute minimum area required around a component. It includes the component body, the pads, and an extra 'excess' boundary to prevent pick-and-place machines from crashing components into each other."
                },
                {
                    heading: "Common Mistakes to Avoid",
                    list: [
                        "Placing silkscreen over exposed copper pads (prevents solder from sticking).",
                        "Forgetting to mark Pin 1 on both the Assembly and Silkscreen layers.",
                        "Ignoring manufacturing tolerances and making the courtyard too tight."
                    ]
                }
            ],
            checklist: [
                "Verify datasheet dimensions and tolerances.",
                "Calculate Toe, Heel, and Side fillets for Density Level B.",
                "Ensure Silkscreen clearance is at least 0.1mm from pads.",
                "Add Courtyard polygon on the correct mechanical layer.",
                "Verify 3D STEP model aligns perfectly with pads."
            ]
        }
    };

    // ─────────────────────────────────────────────
    //  STACKUP DESIGN — full content from PDF
    //  Rendered separately via renderStackupPage()
    // ─────────────────────────────────────────────

    // ─────────────────────────────────────────────
    //  RENDER — BACK BUTTON (shared helper)
    // ─────────────────────────────────────────────
    function backButtonHTML() {
        // Renders a back-arrow button that navigates to the dashboard
        return `<div class="mb-6">
            <button class="back-btn" onclick="loadPage('dashboard')">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Dashboard
            </button>
        </div>`;
    }

    // ─────────────────────────────────────────────
    //  RENDER — STACKUP DESIGN PAGE
    //  Content faithfully extracted from IPC_PCB_Stackup_Design.pdf
    // ─────────────────────────────────────────────
    function renderStackupPage() {
        return `
        ${backButtonHTML()}

        <!-- Page header -->
        <div class="mb-8 border-b border-zinc-200 pb-6">
            <div class="flex flex-wrap gap-2 mb-3">
                <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">IPC-2141A</span>
                <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">IPC-2221B</span>
                <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">IPC-4101C</span>
                <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">IPC-A-600</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-zinc-900 tracking-tight">IPC-Compliant Industrial PCB Stackup Design</h1>
            <p class="text-zinc-500 mt-3 text-base">Engineering Reference — Stackup Architecture, Signal Integrity &amp; Impedance Control</p>
        </div>

        <div class="space-y-12">

            <!-- ══════════════════════════════════════ -->
            <!--  SECTION 1 — Stackup Fundamentals      -->
            <!-- ══════════════════════════════════════ -->
            <section>
                <h2 class="text-2xl font-bold text-zinc-900 mb-1 flex items-center">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm font-bold mr-3">1</span>
                    PCB Stackup Fundamentals
                </h2>
                <p class="text-zinc-700 leading-relaxed mt-3 mb-4">
                    A PCB stackup is the ordered arrangement of copper layers, prepreg (B-stage resin), and core (C-stage) materials that form the final laminated board.
                    Every electrical, mechanical, and thermal property of the PCB is a direct consequence of this arrangement.
                    The stackup is <strong>not a post-design consideration</strong> — it is the foundation upon which signal integrity, power delivery, EMC compliance, and manufacturability are built.
                </p>
                <p class="text-zinc-600 text-sm mb-6">
                    <strong>Governing standards:</strong> IPC-2221B (Generic Standard on Printed Board Design) and IPC-4101C (Specification for Base Materials) govern
                    material selection and construction. IPC-2141A governs controlled-impedance requirements.
                </p>

                <h3 class="text-base font-bold text-zinc-800 mb-3 flex items-center">
                    <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 1.1 — Key Materials Terminology
                </h3>
                <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm">
                    <table class="stackup-table">
                        <thead>
                            <tr><th>Term</th><th>Definition</th><th>Typical Value</th></tr>
                        </thead>
                        <tbody>
                            <tr><td class="font-semibold">Core</td><td>Fully cured (C-stage) dielectric with copper foil laminated on both sides. Provides dimensional stability.</td><td>200–1200 µm</td></tr>
                            <tr><td class="font-semibold">Prepreg</td><td>Partially cured (B-stage) glass/resin sheet. Flows and bonds during lamination. Controls dielectric height (h).</td><td>75–200 µm</td></tr>
                            <tr><td class="font-semibold">εr (Dk)</td><td>Relative dielectric constant of insulating material. Frequency-dependent.</td><td>FR4: 4.0–4.8</td></tr>
                            <tr><td class="font-semibold">Df (tan δ)</td><td>Dissipation factor — loss tangent. Governs high-frequency signal loss.</td><td>FR4: ~0.02 @ 1 GHz</td></tr>
                            <tr><td class="font-semibold">Design Dk</td><td>Effective dielectric constant used for impedance calculations.</td><td>4.2 (nominal FR4)</td></tr>
                            <tr><td class="font-semibold">1 oz Cu</td><td>Standard copper weight: 1 oz/ft² = 35 µm finished thickness.</td><td>35 µm (1.35 mil)</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- ══════════════════════════════════════ -->
            <!--  SECTION 2 — Stackup by Layer Count    -->
            <!-- ══════════════════════════════════════ -->
            <section>
                <h2 class="text-2xl font-bold text-zinc-900 mb-4 flex items-center">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm font-bold mr-3">2</span>
                    Stackup Structures by Layer Count
                </h2>

                <!-- 2-Layer -->
                <div class="mb-10">
                    <h3 class="text-lg font-bold text-zinc-800 mb-3 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 2.1 — 2-Layer PCB
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-4">
                        The simplest buildable structure. Both signal and power routing share the two available copper layers with no embedded reference planes.
                        Suitable only for low-frequency, low-density, non-RF designs.
                    </p>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-4">
                        <table class="stackup-table">
                            <thead><tr><th>Layer</th><th>Function</th><th>Thickness</th></tr></thead>
                            <tbody>
                                <tr class="layer-mask"><td>Solder Mask</td><td>Surface protection / soldermask (both sides)</td><td>—</td></tr>
                                <tr class="layer-signal"><td><strong>L1 — Signal</strong></td><td>Signal traces + power routing (top surface)</td><td>1 oz (35 µm)</td></tr>
                                <tr class="layer-core"><td>Core (FR4)</td><td>Substrate dielectric</td><td>1.0–1.6 mm typical</td></tr>
                                <tr class="layer-signal"><td><strong>L2 — Signal</strong></td><td>Signal traces + GND copper pours (bottom)</td><td>1 oz (35 µm)</td></tr>
                                <tr class="layer-mask"><td>Solder Mask</td><td>Bottom solder mask</td><td>—</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-900">
                        <i class="fa-solid fa-triangle-exclamation text-amber-500 mr-2"></i>
                        <strong>2-layer PCB — no reference planes, poor impedance control.</strong>
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mt-4">
                        <table class="stackup-table">
                            <thead><tr><th>Parameter</th><th>Detail</th></tr></thead>
                            <tbody>
                                <tr><td>IPC Class</td><td>Class 1 (general), Class 2 (dedicated service)</td></tr>
                                <tr><td>Impedance control</td><td>Poor — no solid reference plane</td></tr>
                                <tr><td>EMI performance</td><td>Poor — large current loops</td></tr>
                                <tr><td>Typical applications</td><td>Power supply PCBs, LED drivers, relay modules, simple control boards</td></tr>
                                <tr><td>Max practical frequency</td><td>~50–100 MHz (design-dependent)</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 4-Layer -->
                <div class="mb-10">
                    <h3 class="text-lg font-bold text-zinc-800 mb-3 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 2.2 — 4-Layer PCB
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-4">
                        The minimum stack for any serious industrial or communications design. The addition of two inner planes — typically GND (L2) and PWR (L3) —
                        provides controlled return current paths and radically improves signal integrity and EMI performance.
                    </p>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-4">
                        <table class="stackup-table">
                            <thead><tr><th>Layer</th><th>Function</th><th>Thickness</th></tr></thead>
                            <tbody>
                                <tr class="layer-mask"><td>Solder Mask</td><td>Top solder mask</td><td>—</td></tr>
                                <tr class="layer-signal"><td><strong>L1 — Signal (top)</strong></td><td>Microstrip — high-speed signals, component side</td><td>1 oz (35 µm)</td></tr>
                                <tr class="layer-prepreg"><td>Prepreg</td><td>Controls dielectric height h for L1 impedance</td><td>~4 mil (102 µm)</td></tr>
                                <tr class="layer-gnd"><td><strong>L2 — GND Plane</strong></td><td>Solid ground reference — uninterrupted</td><td>½ oz (17 µm)</td></tr>
                                <tr class="layer-core"><td>Core</td><td>Board bulk — sets total thickness, not used for impedance</td><td>~47 mil (1.19 mm)</td></tr>
                                <tr class="layer-pwr"><td><strong>L3 — PWR Plane</strong></td><td>Power distribution — VCC pours per rail</td><td>½ oz (17 µm)</td></tr>
                                <tr class="layer-prepreg"><td>Prepreg</td><td>Controls dielectric height h for L4 impedance</td><td>~4 mil (102 µm)</td></tr>
                                <tr class="layer-signal"><td><strong>L4 — Signal (btm)</strong></td><td>Microstrip — signals, solder side</td><td>1 oz (35 µm)</td></tr>
                                <tr class="layer-mask"><td>Solder Mask</td><td>Bottom solder mask</td><td>—</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-900 mb-3">
                        <strong>4-layer industrial stackup, 1.6 mm total.</strong> L2–L3 GND/PWR adjacency forms distributed bypass capacitor.
                    </div>
                    <div class="bg-red-50 border border-red-100 rounded-lg p-4 text-sm text-red-900 mb-3">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i>
                        <strong>Critical rule:</strong> Never route high-speed signals on a layer that does not have a solid reference plane as its nearest neighbour.
                        A split or voided plane beneath a high-speed trace forces return current to find an alternative path, creating a radiating loop antenna.
                    </div>
                    <div class="bg-zinc-50 border border-zinc-200 rounded-lg p-4 text-sm text-zinc-800">
                        <i class="fa-solid fa-circle-info text-blue-500 mr-2"></i>
                        The L2–L3 adjacency (GND–PWR) with ~1.2 mm separation forms a distributed bypass capacitor.
                        <strong>C = ε₀·εr·A/h.</strong> For a 100 cm² board at 4 mil prepreg (εr = 4.2): <strong>C ≈ 93 nF</strong> — effective above ~100 MHz without discrete components.
                    </div>
                </div>

                <!-- 6-Layer -->
                <div class="mb-10">
                    <h3 class="text-lg font-bold text-zinc-800 mb-3 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 2.3 — 6-Layer PCB
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-4">
                        Used when routing density, mixed voltage domains, or controlled-impedance differential pairs demand more signal layers.
                        The standard 6-layer arrangement provides two additional signal layers (L3, L4) as balanced striplines,
                        maintaining solid reference planes throughout.
                    </p>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-4">
                        <table class="stackup-table">
                            <thead><tr><th>Layer</th><th>Function</th><th>Thickness</th></tr></thead>
                            <tbody>
                                <tr class="layer-signal"><td><strong>L1 — Signal</strong></td><td>Top microstrip — high-speed, RF, diff pairs</td><td>1 oz (35 µm)</td></tr>
                                <tr class="layer-prepreg"><td>Prepreg</td><td>~4 mil — sets Z0 for L1</td><td>~4 mil</td></tr>
                                <tr class="layer-gnd"><td><strong>L2 — GND Plane</strong></td><td>Solid ground — reference for L1 microstrip, L3 stripline</td><td>½ oz</td></tr>
                                <tr class="layer-core"><td>Core</td><td>~10 mil</td><td>~10 mil</td></tr>
                                <tr class="layer-signal"><td><strong>L3 — Signal</strong></td><td>Stripline — shielded, preferred for sensitive signals</td><td>½ oz</td></tr>
                                <tr class="layer-core"><td>Core (centre)</td><td>~21 mil — board centre layer (symmetry point)</td><td>~21 mil</td></tr>
                                <tr class="layer-signal"><td><strong>L4 — Signal</strong></td><td>Stripline — route orthogonally to L3</td><td>½ oz</td></tr>
                                <tr class="layer-core"><td>Core</td><td>~10 mil</td><td>~10 mil</td></tr>
                                <tr class="layer-pwr"><td><strong>L5 — PWR Plane</strong></td><td>Power distribution — reference for L4/L6</td><td>½ oz</td></tr>
                                <tr class="layer-prepreg"><td>Prepreg</td><td>~4 mil — sets Z0 for L6</td><td>~4 mil</td></tr>
                                <tr class="layer-signal"><td><strong>L6 — Signal</strong></td><td>Bottom microstrip — signals, solder side</td><td>1 oz (35 µm)</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-900 mb-3">
                        <strong>6-layer 1.6 mm stackup.</strong> L3/L4 are balanced stripline — enclosed by reference planes above and below.
                    </div>
                    <ul class="space-y-2 mt-2">
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-check text-blue-500 mr-3 mt-0.5"></i>
                            Route L3 and L4 orthogonally (e.g. L3 horizontal, L4 vertical) to minimise broadside coupling.
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-check text-blue-500 mr-3 mt-0.5"></i>
                            Stripline layers provide inherent EMI shielding — preferred for sensitive analog and low-noise digital signals.
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-check text-blue-500 mr-3 mt-0.5"></i>
                            Field is fully contained within dielectric on stripline layers — effective εr = bulk εr (not effective).
                        </li>
                    </ul>
                </div>

                <!-- 8-Layer -->
                <div class="mb-4">
                    <h3 class="text-lg font-bold text-zinc-800 mb-3 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 2.4 — 8-Layer and Higher
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-4">
                        For HDI, server-class, telecommunications, and aerospace designs. Stackup philosophy scales by adding signal–plane pairs symmetrically about the
                        board centre to maintain flatness and avoid warpage during lamination (IPC-2221B §9.1.3).
                    </p>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-4">
                        <table class="stackup-table">
                            <thead><tr><th>Layer</th><th>Function</th><th>Type</th><th>Notes</th></tr></thead>
                            <tbody>
                                <tr class="layer-signal"><td><strong>L1</strong></td><td>Signal (high-speed, DDR, RF)</td><td>Microstrip</td><td>1 oz — component side</td></tr>
                                <tr class="layer-gnd"><td><strong>L2</strong></td><td>GND plane</td><td>Reference</td><td>½ oz — solid</td></tr>
                                <tr class="layer-signal"><td><strong>L3</strong></td><td>Signal</td><td>Stripline</td><td>½ oz — shielded</td></tr>
                                <tr class="layer-gnd"><td><strong>L4</strong></td><td>GND plane</td><td>Reference</td><td>½ oz — solid</td></tr>
                                <tr class="layer-pwr"><td><strong>L5</strong></td><td>PWR plane</td><td>Reference</td><td>½ oz — distributed bypass with L4</td></tr>
                                <tr class="layer-signal"><td><strong>L6</strong></td><td>Signal</td><td>Stripline</td><td>½ oz — shielded</td></tr>
                                <tr class="layer-gnd"><td><strong>L7</strong></td><td>GND plane</td><td>Reference</td><td>½ oz — solid</td></tr>
                                <tr class="layer-signal"><td><strong>L8</strong></td><td>Signal (bottom)</td><td>Microstrip</td><td>1 oz — solder side</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 text-sm text-amber-900">
                        <i class="fa-solid fa-triangle-exclamation text-amber-500 mr-2"></i>
                        <strong>IPC symmetry rule:</strong> Stackup must be mirror-symmetric about the centre plane. L1 must match L8 (material, thickness, copper weight),
                        L2 must match L7, etc. Asymmetric stackups bow during reflow due to CTE mismatch — a manufacturing defect risk and key inspection criterion per IPC-A-600.
                    </div>
                </div>
            </section>

            <!-- ══════════════════════════════════════ -->
            <!--  SECTION 3 — SI, EMI, Thermal          -->
            <!-- ══════════════════════════════════════ -->
            <section>
                <h2 class="text-2xl font-bold text-zinc-900 mb-4 flex items-center">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm font-bold mr-3">3</span>
                    Signal Integrity, EMI/EMC, and Thermal Performance
                </h2>

                <!-- 3.1 Signal Integrity -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 3.1 — Signal Integrity
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-3">
                        The stackup controls the characteristic impedance of every trace. A trace routed without a reference plane has an undefined impedance —
                        signals reflect at every discontinuity, creating inter-symbol interference (ISI) and timing jitter.
                    </p>
                    <div class="bg-red-50 border border-red-100 rounded-lg p-4 text-sm text-red-900 mb-3">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i>
                        <strong>Return current principle:</strong> At high frequencies (&gt;1 MHz), return current concentrates in the reference plane directly beneath the signal trace.
                        Any gap, slot, or plane split in the reference forces return current to detour, creating a radiating loop (EMI) and adding inductance (SI degradation).
                        <strong>Never route a via that crosses a plane split in the reference layer.</strong>
                    </div>
                    <p class="text-zinc-700 text-sm leading-relaxed">
                        <strong>Crosstalk</strong> is controlled by trace-to-trace spacing and dielectric height. IPC-2141A recommends the <strong>3W rule</strong>:
                        edge-to-edge spacing ≥ 3× trace width to achieve &lt;1% crosstalk coupling.
                        At inner stripline layers, 3W can sometimes be relaxed to 2W due to the dual reference plane effect.
                    </p>
                </div>

                <!-- 3.2 EMI/EMC -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 3.2 — EMI/EMC
                    </h3>
                    <ul class="space-y-2">
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-shield-halved text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Tight coupling to reference plane:</strong> Lower prepreg height (h) reduces loop area and radiated emissions. A trace 4 mil from its reference radiates less than one 12 mil away.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-shield-halved text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>GND–PWR plane capacitance:</strong> Adjacent inner planes form distributed capacitor C = ε₀·εr·A/h, effective above ~100 MHz.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-shield-halved text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Symmetric stackup:</strong> Prevents common-mode current from circulating due to asymmetric inductance.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-shield-halved text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Via return path:</strong> Every signal via transitioning between layers should have a GND return via within 250 mil (IPC-2141A) to provide a low-inductance return path.</span>
                        </li>
                    </ul>
                </div>

                <!-- 3.3 Thermal -->
                <div>
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 3.3 — Thermal Performance
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-3 text-sm">
                        Copper planes act as thermal spreaders. A solid ground plane on L2 with thermal vias (filled, capped per IPC-4761) conducts heat from L1 components into the board mass.
                        Inner plane thermal resistance depends on copper weight and continuity — a split power plane has significantly higher thermal resistance.
                        Arrays of thermal vias under exposed pads (per IPC-7093) are standard for QFN, PowerPAD, and DFN packages.
                    </p>
                    <div class="formula-block">
                        Via thermal resistance:<br>
                        Rth ≈ L / (k · π · (r_o² − r_i²))<br><br>
                        Where:<br>
                        &nbsp;&nbsp;L = board thickness<br>
                        &nbsp;&nbsp;k = copper conductivity (385 W/m·K)<br>
                        &nbsp;&nbsp;r_o, r_i = outer and inner via radii
                    </div>
                </div>
            </section>

            <!-- ══════════════════════════════════════ -->
            <!--  SECTION 4 — Impedance Control         -->
            <!-- ══════════════════════════════════════ -->
            <section>
                <h2 class="text-2xl font-bold text-zinc-900 mb-4 flex items-center">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm font-bold mr-3">4</span>
                    Impedance Control
                </h2>

                <!-- 4.1 Why -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.1 — Why Impedance Matters
                    </h3>
                    <p class="text-zinc-700 leading-relaxed mb-3 text-sm">
                        Any transmission line with a characteristic impedance (Z₀) that does not match the source or load produces reflections.
                    </p>
                    <div class="formula-block mb-3">
                        Reflection coefficient:<br>
                        Γ = (Z_L − Z₀) / (Z_L + Z₀)<br><br>
                        Example: 50Ω trace driving a 75Ω load → Γ = +0.20<br>
                        → 20% of signal voltage reflects back.
                    </div>
                    <p class="text-zinc-600 text-sm">At high data rates this corrupts the eye diagram and causes bit errors. IPC-2141A governs controlled-impedance PCB design and defines the manufacturing tolerance framework.</p>
                </div>

                <!-- 4.2 Microstrip -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.2 — Microstrip Impedance Formula (IPC-2141A)
                    </h3>
                    <p class="text-zinc-600 text-sm mb-3">For a single-ended trace on an outer layer with one reference plane below:</p>
                    <div class="formula-block mb-4">
                        Z₀ = (87 / √(εr + 1.41)) × ln( 5.98h / (0.8W + t) )
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm">
                        <table class="stackup-table">
                            <thead><tr><th>Symbol</th><th>Definition</th><th>Typical Value / Unit</th></tr></thead>
                            <tbody>
                                <tr><td><strong>Z₀</strong></td><td>Characteristic impedance</td><td>Target: 50Ω</td></tr>
                                <tr><td><strong>εr</strong></td><td>Relative dielectric constant of PCB material</td><td>FR4: 4.0–4.8 (use 4.2 for design)</td></tr>
                                <tr><td><strong>h</strong></td><td>Dielectric height — prepreg thickness from trace bottom to reference plane</td><td>4–6 mil (100–150 µm)</td></tr>
                                <tr><td><strong>W</strong></td><td>Trace width</td><td>Calculated for target Z₀</td></tr>
                                <tr><td><strong>t</strong></td><td>Copper thickness (finished)</td><td>1 oz = 1.35 mil; ½ oz = 0.675 mil</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="text-zinc-500 text-xs mt-2 italic">Note: Effective εr for microstrip is less than bulk material εr because the EM field is partly in the air above the trace. Valid for W/h ratios of 0.1 to 2.0.</p>
                </div>

                <!-- 4.3 Stripline -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.3 — Centred Stripline Impedance Formula (IPC-2141A)
                    </h3>
                    <p class="text-zinc-600 text-sm mb-3">For a single-ended trace on an inner layer, centred between two reference planes:</p>
                    <div class="formula-block mb-4">
                        Z₀ = (60 / √(εr)) × ln( 4b / (0.67π × (0.8W + t)) )
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm">
                        <table class="stackup-table">
                            <thead><tr><th>Symbol</th><th>Definition</th><th>Typical Value</th></tr></thead>
                            <tbody>
                                <tr><td><strong>εr</strong></td><td>Bulk dielectric constant — field entirely in laminate (no air)</td><td>FR4: 4.0–4.8</td></tr>
                                <tr><td><strong>b</strong></td><td>Total distance between reference planes</td><td>20–40 mil</td></tr>
                                <tr><td><strong>W</strong></td><td>Trace width</td><td>Calculated</td></tr>
                                <tr><td><strong>t</strong></td><td>Copper thickness</td><td>½ oz = 0.675 mil</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 4.4 Differential Pair -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.4 — Differential Pair Impedance
                    </h3>
                    <p class="text-zinc-600 text-sm mb-3">Differential pairs (USB, Ethernet, PCIe, LVDS, HDMI) require differential impedance Z<sub>diff</sub> control:</p>
                    <div class="formula-block mb-4">
                        Z_diff = 2 × Z₀ × (1 − 0.347 × e^(−2.9 × S/h))<br><br>
                        Where S = edge-to-edge spacing between the two traces.
                        The coupling factor reduces Z_diff below 2·Z₀ as traces are brought closer together.
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-3">
                        <table class="stackup-table">
                            <thead><tr><th>Target Z_diff</th><th>Use Case</th><th>Approx. Trace/Space (FR4, h=4 mil, 1 oz)</th></tr></thead>
                            <tbody>
                                <tr><td><strong>90Ω differential</strong></td><td>USB 2.0, USB 3.x, LVDS</td><td>~5 mil trace / 5 mil space</td></tr>
                                <tr><td><strong>100Ω differential</strong></td><td>Ethernet, PCIe, HDMI</td><td>~6 mil trace / 6 mil space</td></tr>
                                <tr><td><strong>120Ω differential</strong></td><td>RS-485, RS-422 (long-line termination)</td><td>Wider spacing or higher h</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
                        Always verify with PCB manufacturer field solver and confirmed material Dk.
                    </div>
                </div>

                <!-- 4.5 Worked Example -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.5 — Worked Example: 50Ω Microstrip on 4-Layer FR4
                    </h3>
                    <div class="bg-zinc-50 border border-zinc-200 rounded-lg p-4 text-sm mb-4">
                        <p class="font-semibold text-zinc-800 mb-2">Given:</p>
                        <ul class="space-y-1 text-zinc-700 text-sm">
                            <li>• Material: FR4, εr = 4.2 (manufacturer-confirmed Dk)</li>
                            <li>• Prepreg thickness h = 4.0 mil (102 µm) — L1 to L2</li>
                            <li>• Copper weight L1: 1 oz → t = 1.35 mil</li>
                            <li>• Target: Z₀ = 50Ω</li>
                        </ul>
                    </div>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm mb-4">
                        <table class="stackup-table">
                            <thead><tr><th>W (mil)</th><th>Calculation</th><th>Z₀ Result</th><th>Decision</th></tr></thead>
                            <tbody>
                                <tr><td>7.0</td><td>36.72 × ln(23.92 / 6.95)</td><td>45.4Ω</td><td>Too low</td></tr>
                                <tr><td>5.5</td><td>36.72 × ln(23.92 / 5.75)</td><td>52.4Ω</td><td>Slightly high</td></tr>
                                <tr><td class="font-bold text-emerald-700">6.0</td><td>36.72 × ln(23.92 / 6.15)</td><td class="font-bold text-emerald-700">49.8Ω</td><td class="text-emerald-700 font-bold">✓ Target met</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4 text-sm text-emerald-900">
                        <i class="fa-solid fa-circle-check text-emerald-600 mr-2"></i>
                        <strong>Result:</strong> 6.0 mil (0.152 mm) trace width achieves ~50Ω on a 4-layer FR4 board with 4 mil prepreg.
                        Manufacturer impedance tolerance per IPC-2141A: ±10% standard; specify ±5% with TDR coupon testing.
                    </div>
                </div>

                <!-- 4.6 Material Selection -->
                <div class="mb-8">
                    <h3 class="text-base font-bold text-zinc-800 mb-2 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.6 — PCB Material Selection Beyond FR4
                    </h3>
                    <div class="overflow-x-auto rounded-lg border border-zinc-200 shadow-sm">
                        <table class="stackup-table">
                            <thead><tr><th>Material</th><th>εr</th><th>Df (tan δ)</th><th>Application</th></tr></thead>
                            <tbody>
                                <tr><td>Standard FR4 (Isola 370HR, Shengyi S1000-2)</td><td>4.0–4.8</td><td>0.020–0.025</td><td>General industrial, up to ~1 GHz</td></tr>
                                <tr><td>High-speed FR4 (Isola FR408HR, TU-872)</td><td>3.6–3.9</td><td>0.010–0.015</td><td>PCIe Gen3/4, 10GbE</td></tr>
                                <tr><td>PTFE/Rogers RO4003C</td><td>3.55</td><td>0.0027</td><td>RF, microwave, mmWave</td></tr>
                                <tr><td>Low-loss ceramic (Megtron 6)</td><td>3.6–3.7</td><td>0.002</td><td>25G+ SerDes, automotive radar</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 4.7 DFM Rules -->
                <div>
                    <h3 class="text-base font-bold text-zinc-800 mb-3 flex items-center">
                        <i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> 4.7 — Manufacturing Constraints and DFM Rules
                    </h3>
                    <ul class="space-y-2">
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Minimum trace width:</strong> 3 mil (75 µm) standard; 2 mil (50 µm) for HDI processes.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Impedance coupon:</strong> Place 6-inch controlled-impedance test trace on each panel edge. TDR measurement at incoming QC verifies fabricated stackup matches design intent.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Prepreg thickness tolerance:</strong> ±10–15%. Specify materials by IPC-4101 slash sheet (e.g., /21 for 7628 glass style, /26 for 1080 glass style) — never by generic 'FR4'.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Copper etch correction:</strong> Trace width increases at base due to etch undercut (trapezoidal cross-section). Manufacturers apply 0.5–1 mil width correction — account for this in impedance calculation.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Solder mask over impedance traces:</strong> Mask Dk ≈ 3.5–4.0 adds effective εr above microstrip trace. For RF, specify 'no solder mask over controlled-impedance traces'.</span>
                        </li>
                        <li class="flex items-start bg-zinc-50 p-3 rounded-md border border-zinc-100 text-sm text-zinc-700">
                            <i class="fa-solid fa-industry text-blue-500 mr-3 mt-0.5"></i>
                            <span><strong>Stackup specification in fab notes:</strong> List each layer material, glass style, Dk, Df, copper weight, and finished thickness. Reference IPC-4101C. Do not rely on fabricator to infer from board thickness.</span>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- ══════════════════════════════════════ -->
            <!--  SECTION 5 — Design Checklist          -->
            <!-- ══════════════════════════════════════ -->
            <section>
                <h2 class="text-2xl font-bold text-zinc-900 mb-4 flex items-center">
                    <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-sm font-bold mr-3">5</span>
                    Design Checklist — IPC-Compliant Industrial Practice
                </h2>
                <div class="bg-white border border-zinc-200 rounded-xl shadow-sm p-6 md:p-8">
                    <h3 class="text-lg font-bold text-zinc-900 mb-4 flex items-center">
                        <i class="fa-solid fa-list-check text-emerald-600 mr-3"></i> Final IPC Checklist
                    </h3>
                    <ul class="space-y-3" id="stackup-checklist">
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#1</strong> — Every high-speed signal layer has an uninterrupted reference plane as nearest neighbour <em class="text-blue-500">(IPC-2221B §9)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#2</strong> — Prepreg glass style and Dk/Df sourced from manufacturer datasheet, not generic FR4 values <em class="text-blue-500">(IPC-4101C)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#3</strong> — Target impedance calculated using field solver; verified with TDR coupons <em class="text-blue-500">(IPC-2141A §4.2)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#4</strong> — Stackup is mirror-symmetric about board centre plane to prevent reflow warpage <em class="text-blue-500">(IPC-2221B §9.1.3)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#5</strong> — GND return via placed within 250 mil of every signal via transitioning between layers <em class="text-blue-500">(IPC-2141A)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#6</strong> — Differential pairs: matched length (±5 mil USB/LVDS; ±1 mil PCIe Gen4+) <em class="text-blue-500">(Protocol spec)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#7</strong> — No signal routing across reference plane splits or voids <em class="text-blue-500">(SI / EMI best practice)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#8</strong> — Thermal vias specified under exposed pads (QFN, PowerPAD, DFN) <em class="text-blue-500">(IPC-7093)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#9</strong> — Stackup drawing submitted to PCB fabricator as controlled document <em class="text-blue-500">(IPC-2221B)</em></span>
                        </li>
                        <li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)">
                            <i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i>
                            <span><strong>#10</strong> — Incoming QC includes TDR coupon test for all controlled-impedance layers <em class="text-blue-500">(IPC-2141A §4)</em></span>
                        </li>
                    </ul>
                </div>

                <!-- Standards footer -->
                <div class="mt-6 bg-zinc-50 border border-zinc-200 rounded-lg p-4 text-xs text-zinc-500 leading-relaxed">
                    <i class="fa-solid fa-book text-zinc-400 mr-2"></i>
                    Prepared in accordance with IPC-2141A (Controlled Impedance Circuit Boards), IPC-2221B (Generic Standard on Printed Board Design),
                    IPC-4101C (Specification for Base Materials), and IPC-A-600 (Acceptability of Printed Boards).
                    All impedance formulas sourced from IPC-2141A Appendix A. Field solver verification is mandatory for tolerances tighter than ±10%.
                </div>
            </section>

        </div><!-- /space-y-12 -->
        `;
    }

    // ─────────────────────────────────────────────
    //  RENDER — GENERIC DB PAGES (footprint, etc.)
    // ─────────────────────────────────────────────
    function renderDbPage(pageId, data) {
        let html = '';

        // Back button for every topic page (not on dashboard)
        if (pageId !== 'dashboard') {
            html += backButtonHTML();
        }

        html += `
            <div class="mb-8 border-b border-zinc-200 pb-6">
                <h1 class="text-3xl md:text-4xl font-bold text-zinc-900 tracking-tight">${data.title}</h1>
                <p class="text-zinc-600 mt-3 text-lg leading-relaxed whitespace-pre-line">${data.intro}</p>
            </div>
        `;

        // Dashboard grid
        if (pageId === 'dashboard' && data.modules) {
            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8">`;
            data.modules.forEach(mod => {
                html += `
                    <div onclick="loadPage('${mod.id}')" class="bg-white border border-zinc-200 p-6 rounded-xl shadow-sm hover:shadow-lg hover:border-blue-400 transform hover:-translate-y-1 transition-all cursor-pointer group">
                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i class="fa-solid ${mod.icon}"></i>
                        </div>
                        <h3 class="font-bold text-zinc-900 mb-2 group-hover:text-blue-600 transition-colors">${mod.title}</h3>
                        <p class="text-sm text-zinc-500">${mod.desc}</p>
                    </div>
                `;
            });
            html += `</div>`;
        }

        // Sections
        if (data.sections) {
            html += `<div class="space-y-10">`;
            data.sections.forEach(sec => {
                html += `<section><h2 class="text-xl font-bold text-zinc-900 mb-3 flex items-center"><i class="fa-solid fa-caret-right text-blue-500 mr-2 text-sm"></i> ${sec.heading}</h2>`;
                if (sec.content) html += `<p class="text-zinc-700 leading-relaxed mb-4">${sec.content}</p>`;
                if (sec.cards) {
                    html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">`;
                    sec.cards.forEach(card => {
                        html += `<div class="bg-white border border-zinc-200 p-5 rounded-lg shadow-sm border-t-4 border-t-blue-500"><h4 class="font-bold text-zinc-900 mb-2">${card.title}</h4><p class="text-sm text-zinc-600">${card.text}</p></div>`;
                    });
                    html += `</div>`;
                }
                if (sec.list) {
                    html += `<ul class="space-y-3 mt-4">`;
                    sec.list.forEach(item => {
                        html += `<li class="flex items-start bg-red-50 text-red-900 p-3 rounded-md border border-red-100"><i class="fa-solid fa-triangle-exclamation text-red-500 mr-3 mt-0.5"></i> ${item}</li>`;
                    });
                    html += `</ul>`;
                }
                html += `</section>`;
            });
            html += `</div>`;
        }

        // Checklist
        if (data.checklist) {
            html += `
                <div class="mt-12 bg-white border border-zinc-200 rounded-xl shadow-sm p-6 md:p-8">
                    <h3 class="text-xl font-bold text-zinc-900 mb-4 flex items-center"><i class="fa-solid fa-list-check text-emerald-600 mr-3"></i> Final DFM Checklist</h3>
                    <ul class="space-y-3">
            `;
            data.checklist.forEach(item => {
                html += `<li class="flex items-center text-zinc-700 bg-zinc-50 p-3 rounded-md border border-zinc-100 hover:bg-zinc-100 transition-colors cursor-pointer" onclick="toggleCheck(this)"><i class="fa-regular fa-square text-zinc-400 mr-3 text-lg"></i> ${item}</li>`;
            });
            html += `</ul></div>`;
        }

        return html;
    }

    // ─────────────────────────────────────────────
    //  MAIN ROUTER
    // ─────────────────────────────────────────────
    function loadPage(pageId) {
        const contentDiv = document.getElementById('app-content');

        // Trigger fade animation
        contentDiv.classList.remove('fade-in');
        void contentDiv.offsetWidth;
        contentDiv.classList.add('fade-in');

        // Route to the right renderer
        if (pageId === 'stackup') {
            contentDiv.innerHTML = renderStackupPage();
        } else {
            const data = db[pageId] || { title: "Module Coming Soon", intro: "This engineering module is currently under development." };
            contentDiv.innerHTML = renderDbPage(pageId, data);
        }

        // Update sidebar active state
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.classList.remove('bg-blue-50', 'text-blue-600');
            nav.classList.add('hover:bg-zinc-100');
            if (nav.getAttribute('data-page') === pageId) {
                nav.classList.remove('hover:bg-zinc-100');
                nav.classList.add('bg-blue-50', 'text-blue-600');
            }
        });

        // Scroll to top on page change
        document.querySelector('.overflow-y-auto').scrollTop = 0;
    }

    // ─────────────────────────────────────────────
    //  TOGGLE CHECKLIST ITEM
    // ─────────────────────────────────────────────
    function toggleCheck(element) {
        const icon = element.querySelector('i');
        if (icon.classList.contains('fa-square')) {
            icon.className = 'fa-solid fa-square-check text-emerald-500 mr-3 text-lg';
            element.classList.add('text-zinc-400', 'line-through');
        } else {
            icon.className = 'fa-regular fa-square text-zinc-400 mr-3 text-lg';
            element.classList.remove('text-zinc-400', 'line-through');
        }
    }

    // ─────────────────────────────────────────────
    //  BOOT
    // ─────────────────────────────────────────────
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => loadPage(item.getAttribute('data-page')));
    });
    document.getElementById('logo-btn').addEventListener('click', () => loadPage('dashboard'));
    window.onload = () => loadPage('dashboard');
    </script>
</body>
</html>
