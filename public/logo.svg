<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" role="img" aria-label="PCBRules Logo">
  <defs>
    <!-- Strict hexagon clip — cuts the PNG exactly to hex shape -->
    <clipPath id="hex-clip">
      <polygon points="100,12 175,55.5 175,144.5 100,188 25,144.5 25,55.5"/>
    </clipPath>
  </defs>

  <!-- The approved neon hex PNG, clipped strictly to hexagon shape -->
  <image
    href="/logo-new.png"
    x="0" y="0"
    width="200" height="200"
    clip-path="url(#hex-clip)"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>
